<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fissher</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
    tailwind.config = { darkMode: 'class' }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'firebase/app';
    import { 
      getFirestore, collection, addDoc, onSnapshot, serverTimestamp, 
      updateDoc, doc, increment, setDoc, getDoc, deleteDoc, enableIndexedDbPersistence
    } from 'firebase/firestore';
    import { 
      getAuth, signInAnonymously, onAuthStateChanged 
    } from 'firebase/auth';

    const { useState, useEffect } = React;

    // --- Icons (簡略化) ---
    const Fish = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.46-4.94 6-8.5 6-3.56 0-6.06-2.54-7-6Z"/><path d="M18 12v.01"/><path d="M2 9v6l5-3-5-3Z"/></svg>;
    const Hash = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>;
    const Heart = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
    const AlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

    // --- Firebase Setup ---
    const firebaseConfig = {
      apiKey: "AIzaSyDZv31PprpWS54nmd-b4Z3pO0zK6IZIIAg",
      authDomain: "my-fissher-sns.firebaseapp.com",
      projectId: "my-fissher-sns",
      storageBucket: "my-fissher-sns.firebasestorage.app",
      messagingSenderId: "1019088757788",
      appId: "1:1019088757788:web:e3c45ee0c89d12c6702bd9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'fisher-sns-v3';

    function App() {
      const [isDark, setIsDark] = useState(document.documentElement.classList.contains('dark'));
      const [appUser, setAppUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [posts, setPosts] = useState([]);
      const [newPost, setNewPost] = useState('');
      const [customIdInput, setCustomIdInput] = useState('');
      const [userNameInput, setUserNameInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [isAuthLoading, setIsAuthLoading] = useState(false);
      const [authMode, setAuthMode] = useState('register');

      // 1. 認証と初期化
      useEffect(() => {
        const initAuth = async () => {
          try {
            // 匿名ログイン
            const cred = await signInAnonymously(auth);
            
            // ローカルストレージから復旧を試みる
            const savedId = localStorage.getItem('fissher_custom_id');
            const savedName = localStorage.getItem('fissher_user_name');
            
            if (savedId && savedName) {
              // サーバーに本当にそのIDがあるか確認
              const accountRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', savedId);
              const snap = await getDoc(accountRef);
              if (snap.exists()) {
                setAppUser({ customId: savedId, userName: snap.data().userName || savedName });
              } else {
                localStorage.clear();
              }
            }
          } catch (e) {
            console.error("Init Error:", e);
          } finally {
            setLoading(false);
          }
        };
        initAuth();
      }, []);

      // 2. タイムラインのリアルタイム取得
      useEffect(() => {
        if (!appUser) return;
        const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
        const unsubscribe = onSnapshot(postsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPosts(data.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
        }, (err) => {
          console.warn("Snapshot error (ignore if offline):", err);
        });
        return () => unsubscribe();
      }, [appUser]);

      const handleRegister = async (e) => {
        e.preventDefault();
        setAuthError('');
        const cid = customIdInput.trim().toLowerCase();
        if (!/^[a-zA-Z0-9]{3,15}$/.test(cid)) return setAuthError('IDは3-15文字の英数字のみです');
        if (!userNameInput.trim()) return setAuthError('名前を入力してください');

        setIsAuthLoading(true);
        try {
          const accountRef = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', cid);
          const snap = await getDoc(accountRef);
          if (snap.exists()) {
            setAuthError('このIDは既に使用されています');
          } else {
            await setDoc(accountRef, { userName: userNameInput.trim(), createdAt: serverTimestamp() });
            localStorage.setItem('fissher_custom_id', cid);
            localStorage.setItem('fissher_user_name', userNameInput.trim());
            setAppUser({ customId: cid, userName: userNameInput.trim() });
          }
        } catch (e) {
          setAuthError('サーバー接続エラー。リロードして試してください。');
          console.error(e);
        }
        setIsAuthLoading(false);
      };

      const handleSubmitPost = async (e) => {
        e.preventDefault();
        if (!newPost.trim() || !appUser) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
            text: newPost,
            userId: appUser.customId,
            userName: appUser.userName,
            likes: 0,
            createdAt: serverTimestamp()
          });
          setNewPost('');
        } catch (e) { alert("送信に失敗しました"); }
      };

      if (loading) return <div className="h-screen flex items-center justify-center dark:text-white">読み込み中...</div>;

      if (!appUser) {
        return (
          <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4">
            <div className="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-200 dark:border-slate-800">
              <h1 className="text-3xl font-black text-center mb-6 dark:text-white flex items-center justify-center gap-2">
                <Fish className="w-8 h-8 text-cyan-500" /> Fissher
              </h1>
              {authError && <div className="bg-rose-50 text-rose-500 p-3 rounded-xl mb-4 text-sm font-bold flex items-center gap-2"><AlertCircle className="w-4 h-4"/>{authError}</div>}
              <form onSubmit={handleRegister} className="space-y-4">
                <input value={customIdInput} onChange={e=>setCustomIdInput(e.target.value)} placeholder="ID (英数字3-15文字)" className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-cyan-500" />
                <input value={userNameInput} onChange={e=>setUserNameInput(e.target.value)} placeholder="表示名" className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-cyan-500" />
                <button className="w-full bg-cyan-500 text-white font-bold py-4 rounded-2xl hover:bg-cyan-600 transition-all">{isAuthLoading ? "通信中..." : "はじめる"}</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 dark:text-white">
          <header className="p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center">
            <div className="font-black text-xl flex items-center gap-2"><Fish className="w-6 h-6 text-cyan-500"/> Fissher</div>
            <div className="text-sm font-bold opacity-70">@{appUser.customId}</div>
          </header>
          <main className="max-w-2xl mx-auto p-4">
            <form onSubmit={handleSubmitPost} className="mb-8">
              <textarea value={newPost} onChange={e=>setNewPost(e.target.value)} placeholder="いま何してる？" className="w-full p-4 rounded-3xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 h-32 resize-none outline-none focus:ring-2 focus:ring-cyan-500 mb-2" />
              <button className="bg-cyan-500 text-white px-8 py-3 rounded-full font-bold float-right">投稿</button>
            </form>
            <div className="space-y-4 mt-16">
              {posts.map(p => (
                <div key={p.id} className="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800">
                  <div className="flex justify-between mb-2">
                    <span className="font-bold">{p.userName} <span className="text-sm opacity-50 font-normal">@{p.userId}</span></span>
                  </div>
                  <p className="whitespace-pre-wrap">{p.text}</p>
                </div>
              ))}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
