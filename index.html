<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fissher</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
    tailwind.config = { darkMode: 'class' }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'firebase/app';
    import { 
      getFirestore, collection, addDoc, onSnapshot, serverTimestamp, 
      doc, getDoc, setDoc
    } from 'firebase/firestore';
    import { 
      getAuth, signInAnonymously
    } from 'firebase/auth';

    const { useState, useEffect } = React;

    // --- Icons ---
    const Fish = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.46-4.94 6-8.5 6-3.56 0-6.06-2.54-7-6Z"/><path d="M18 12v.01"/><path d="M2 9v6l5-3-5-3Z"/></svg>;
    const AlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

    // --- Firebase 設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDZv31PprpWS54nmd-b4Z3pO0zK6IZIIAg",
      authDomain: "my-fissher-sns.firebaseapp.com",
      projectId: "my-fissher-sns",
      storageBucket: "my-fissher-sns.firebasestorage.app",
      messagingSenderId: "1019088757788",
      appId: "1:1019088757788:web:e3c45ee0c89d12c6702bd9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'fisher-sns-v3';

    function App() {
      const [appUser, setAppUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [posts, setPosts] = useState([]);
      const [newPost, setNewPost] = useState('');
      const [customIdInput, setCustomIdInput] = useState('');
      const [userNameInput, setUserNameInput] = useState('');
      const [authError, setAuthError] = useState('');
      const [isAuthLoading, setIsAuthLoading] = useState(false);

      const MAX_CHARS = 140;

      useEffect(() => {
        const init = async () => {
          try {
            await signInAnonymously(auth);
            const savedId = localStorage.getItem('fissher_id');
            const savedName = localStorage.getItem('fissher_name');
            if (savedId && savedName) {
              setAppUser({ customId: savedId, userName: savedName });
            }
          } catch (e) {
            console.error("Auth Init Error:", e);
          } finally {
            setLoading(false);
          }
        };
        init();
      }, []);

      useEffect(() => {
        if (!appUser) return;
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
        return onSnapshot(q, (snapshot) => {
          const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setPosts(docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
        });
      }, [appUser]);

      const handleRegister = async (e) => {
        e.preventDefault();
        setAuthError('');
        const cid = customIdInput.trim().toLowerCase();
        if (!/^[a-zA-Z0-9]{3,15}$/.test(cid)) return setAuthError('IDは3-15文字の半角英数字のみです');
        if (!userNameInput.trim()) return setAuthError('名前を入力してください');

        setIsAuthLoading(true);
        try {
          const ref = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', cid);
          const snap = await getDoc(ref);
          if (snap.exists()) {
            setAuthError('このIDは既に使用されています');
            setIsAuthLoading(false);
            return;
          }
          
          await setDoc(ref, { userName: userNameInput.trim(), createdAt: serverTimestamp() });
          localStorage.setItem('fissher_id', cid);
          localStorage.setItem('fissher_name', userNameInput.trim());
          setAppUser({ customId: cid, userName: userNameInput.trim() });
        } catch (e) {
          console.error("Registration Error:", e);
          setAuthError(`登録エラー: Firestoreのルールを確認してください。`);
        }
        setIsAuthLoading(false);
      };

      const handlePost = async (e) => {
        e.preventDefault();
        if (!newPost.trim() || newPost.length > MAX_CHARS) return;
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
          text: newPost,
          userId: appUser.customId,
          userName: appUser.userName,
          createdAt: serverTimestamp()
        });
        setNewPost('');
      };

      if (loading) return <div className="h-screen flex items-center justify-center dark:text-white">読み込み中...</div>;

      if (!appUser) {
        return (
          <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4">
            <div className="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-200 dark:border-slate-800">
              <h1 className="text-3xl font-black text-center mb-6 dark:text-white flex items-center justify-center gap-2">
                <Fish className="w-8 h-8 text-cyan-500" /> Fissher
              </h1>
              {authError && <div className="bg-rose-50 text-rose-500 p-3 rounded-xl mb-4 text-sm font-bold flex items-center gap-2"><AlertCircle className="w-4 h-4"/>{authError}</div>}
              <form onSubmit={handleRegister} className="space-y-4">
                <input value={customIdInput} onChange={e=>setCustomIdInput(e.target.value)} placeholder="ID (半角英数字3-15文字)" className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-cyan-500 transition-all" />
                <input value={userNameInput} onChange={e=>setUserNameInput(e.target.value)} placeholder="表示名" className="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-cyan-500 transition-all" />
                <button disabled={isAuthLoading} className="w-full bg-cyan-500 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-4 rounded-2xl hover:bg-cyan-600 transition-all">
                  {isAuthLoading ? '通信中...' : 'はじめる'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 dark:text-white pb-20">
          <header className="p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10 flex justify-between items-center">
            <div className="font-black text-xl flex items-center gap-2"><Fish className="w-6 h-6 text-cyan-500"/> Fissher</div>
            <div className="text-sm font-bold opacity-70">@{appUser.customId}</div>
          </header>
          
          <main className="max-w-2xl mx-auto p-4">
            <form onSubmit={handlePost} className="mb-8">
              <div className="relative">
                 <textarea 
                  value={newPost} 
                  onChange={e=>setNewPost(e.target.value)} 
                  placeholder="いま何してる？" 
                  className={`w-full p-4 rounded-3xl bg-white dark:bg-slate-900 border ${newPost.length > MAX_CHARS ? 'border-rose-500 focus:ring-rose-500' : 'border-slate-200 dark:border-slate-800 focus:ring-cyan-500'} h-32 resize-none outline-none focus:ring-2 transition-all mb-2`}
                />
                <div className={`absolute bottom-6 right-4 text-sm font-bold ${newPost.length > MAX_CHARS ? 'text-rose-500' : 'text-slate-400'}`}>
                  {newPost.length} / {MAX_CHARS}
                </div>
              </div>
              <button 
                disabled={!newPost.trim() || newPost.length > MAX_CHARS} 
                className="bg-cyan-500 disabled:bg-slate-300 disabled:cursor-not-allowed text-white px-8 py-3 rounded-full font-bold float-right transition-all hover:bg-cyan-600"
              >
                投稿
              </button>
              <div className="clear-both"></div>
            </form>

            <div className="space-y-4">
              {posts.map(p => (
                <div key={p.id} className="bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
                  <div className="flex items-center gap-2 mb-3">
                     <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 flex items-center justify-center text-white font-bold">
                        {p.userName.charAt(0)}
                     </div>
                     <div>
                        <div className="font-bold">{p.userName}</div>
                        <div className="text-sm opacity-50">@{p.userId}</div>
                     </div>
                  </div>
                  <p className="whitespace-pre-wrap leading-relaxed">{p.text}</p>
                </div>
              ))}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
